# 开发环境配置

crypto:
  kem_algorithm: "ML-KEM-512"
  xmss_tree_height: 6
  xmss_state_file: "/tmp/xmss_state.enc"

redis:
  host: "localhost"
  port: 6379
  db: 0
  ttl: 600

blockchain:
  type: "hyperledger-fabric"
  network: "local"
  channel: "iov-channel"
  chaincode: "iov-identity"

logging:
  level: "INFO"
  format: "[%(levelname)s] %(name)s: %(message)s"